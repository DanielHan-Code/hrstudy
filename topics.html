<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주제 후보 — HR Study</title>
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.09);
  --border-strong: rgba(0,0,0,0.18);
  --text-primary: #1a1a18;
  --text-secondary: #5c5c56;
  --text-tertiary: #9c9a90;
  --radius: 14px;
  --radius-sm: 8px;
  --nav-h: 52px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
}

/* ── Nav ── */
.site-nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border-strong);
  padding: 0 24px;
  height: var(--nav-h);
}
.nav-inner {
  max-width: 1140px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 100%;
}
.nav-brand {
  font-family: Georgia, serif; font-size: 15px; font-weight: 600;
  color: var(--text-primary);
}
.nav-links { display: flex; gap: 4px; }
.nav-link {
  font-size: 13px; color: var(--text-secondary); text-decoration: none;
  padding: 6px 14px; border-radius: var(--radius-sm);
  transition: background 0.15s, color 0.15s;
}
.nav-link:hover { background: #f0eeea; color: var(--text-primary); }
.nav-link.active { background: #f0eeea; color: var(--text-primary); font-weight: 600; }

/* ── Page Layout ── */
.page-wrapper {
  max-width: 1140px; margin: 0 auto;
  display: flex; gap: 0;
  min-height: calc(100vh - var(--nav-h));
}

/* ── Sidebar ── */
.sidebar {
  width: 272px; flex-shrink: 0;
  border-right: 1px solid var(--border-strong);
  position: sticky;
  top: var(--nav-h);
  height: calc(100vh - var(--nav-h));
  overflow-y: auto;
  background: var(--surface);
  padding: 24px 0 40px;
}
.sidebar-header {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-tertiary); font-weight: 700;
  padding: 0 20px 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.topic-nav-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 20px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.15s, border-color 0.15s;
  text-decoration: none;
}
.topic-nav-item:hover { background: #f7f5f0; }
.topic-nav-item.active { border-left-color: var(--active-color, #1D9E75); background: #f7f5f0; }
.topic-num {
  font-family: Georgia, serif; font-size: 18px; font-weight: 600;
  color: var(--text-tertiary); line-height: 1.2; min-width: 24px;
  flex-shrink: 0;
}
.topic-nav-item.active .topic-num { color: var(--active-color, #1D9E75); }
.topic-nav-title {
  font-size: 13px; font-weight: 600; color: var(--text-primary);
  line-height: 1.45; margin-bottom: 3px;
}
.topic-nav-field {
  font-size: 11px; color: var(--text-tertiary); line-height: 1.4;
}

/* ── Main Content ── */
.content {
  flex: 1; min-width: 0;
  padding: 40px 48px 80px;
  overflow-y: auto;
}

/* ── Topic Detail ── */
.topic-header { margin-bottom: 32px; }
.topic-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.topic-badge {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  padding: 3px 10px; border-radius: 20px; border: 1px solid transparent;
}
.field-badge {
  font-size: 11px; color: var(--text-tertiary);
  background: #f0eeea; padding: 3px 10px; border-radius: 20px;
}
.status-badge {
  font-size: 11px; color: #854F0B; background: #FAEEDA;
  border: 1px solid #FAC775; padding: 3px 10px; border-radius: 20px; font-weight: 600;
}
.topic-title {
  font-family: Georgia, 'Apple SD Gothic Neo', serif;
  font-size: clamp(20px, 3vw, 28px); font-weight: 600; line-height: 1.3;
  margin-bottom: 14px;
}
.theory-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.theory-tag {
  font-size: 12px; background: #f0eeea; color: var(--text-secondary);
  padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border-strong);
}

/* ── Model Block ── */
.model-section {
  background: var(--surface); border: 1px solid var(--border-strong);
  border-radius: var(--radius); padding: 20px 24px;
  margin-bottom: 36px;
}
.model-label {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-tertiary); font-weight: 700; margin-bottom: 12px;
}
.model-visual {
  display: flex; align-items: center; gap: 0; flex-wrap: wrap;
}
.model-box {
  background: var(--bg); border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); padding: 10px 16px;
  text-align: center; min-width: 120px;
}
.model-box-label {
  font-size: 10px; color: var(--text-tertiary); text-transform: uppercase;
  letter-spacing: 0.08em; margin-bottom: 4px;
}
.model-box-var {
  font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.4;
}
.model-arrow {
  font-size: 18px; color: var(--text-tertiary); padding: 0 8px; flex-shrink: 0;
}
.model-mod-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.model-mod-arrow { font-size: 13px; color: var(--text-tertiary); }
.model-mod-box {
  background: #fff9f0; border: 1px dashed #FAC775;
  border-radius: var(--radius-sm); padding: 6px 12px;
  font-size: 11px; color: #854F0B; text-align: center;
}
.model-mod-box .mod-label { font-size: 10px; color: var(--text-tertiary); margin-bottom: 2px; }

/* ── Sections ── */
.section { margin-bottom: 32px; }
.section-heading {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-tertiary); font-weight: 700;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.section p {
  font-size: 14px; color: var(--text-secondary); line-height: 1.8;
  margin-bottom: 12px;
}
.section p:last-child { margin-bottom: 0; }

/* Problems */
.problem-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
.problem-item {
  padding: 14px 16px 14px 20px;
  border-left: 3px solid var(--border-strong);
  background: var(--surface);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.problem-item:hover { border-left-color: var(--topic-color, #9c9a90); }
.problem-num { font-size: 11px; color: var(--text-tertiary); margin-bottom: 4px; }
.problem-title { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
.problem-body { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }

/* Purposes */
.purpose-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.purpose-item {
  font-size: 13px; color: var(--text-secondary); line-height: 1.7;
  padding: 8px 12px 8px 16px; border-left: 2px solid var(--border-strong);
}

/* Contributions */
.contrib-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 720px) { .contrib-grid { grid-template-columns: 1fr; } }
.contrib-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 16px;
}
.contrib-card-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 10px;
}
.contrib-card ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.contrib-card li {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  padding-left: 12px; position: relative;
}
.contrib-card li::before {
  content: ''; position: absolute; left: 0; top: 8px;
  width: 4px; height: 4px; border-radius: 50%; background: #ccc;
}

/* Variables Table */
.var-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.var-table th {
  text-align: left; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-tertiary); font-weight: 700;
  padding: 8px 12px; border-bottom: 2px solid var(--border-strong);
}
.var-table td {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  color: var(--text-secondary); line-height: 1.55;
}
.var-table tr:last-child td { border-bottom: none; }
.var-table td:first-child { font-weight: 600; color: var(--text-primary); white-space: nowrap; }
.var-role-chip {
  display: inline-block; font-size: 11px; padding: 1px 8px;
  border-radius: 20px; border: 1px solid transparent; font-weight: 600;
}

/* References */
.ref-list { display: flex; flex-direction: column; gap: 10px; }
.ref-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 16px;
  display: flex; flex-direction: column; gap: 4px;
}
.ref-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.ref-content { font-size: 12px; color: var(--text-secondary); line-height: 1.55; }
.ref-source { font-size: 11px; color: var(--text-tertiary); }
.ref-link {
  font-size: 12px; color: #185FA5; text-decoration: none; margin-top: 2px;
  display: inline-flex; align-items: center; gap: 4px;
}
.ref-link:hover { text-decoration: underline; }

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; color: var(--text-tertiary); text-align: center; gap: 12px;
}
.empty-state-num {
  font-family: Georgia, serif; font-size: 72px; font-weight: 600; opacity: 0.15;
}
.empty-state-text { font-size: 15px; }

/* Mobile */
@media (max-width: 768px) {
  .page-wrapper { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border-strong); padding: 16px 0 8px; }
  .content { padding: 24px 20px 60px; }
}

/* ── Memo ── */
.memo-section {
  margin-top: 40px;
  border-top: 1px solid var(--border-strong);
  padding-top: 32px;
}
.memo-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.memo-label {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-tertiary); font-weight: 700;
}
.memo-saved-indicator {
  font-size: 11px; color: var(--text-tertiary);
  opacity: 0; transition: opacity 0.4s;
}
.memo-saved-indicator.show { opacity: 1; }
.memo-textarea {
  width: 100%; min-height: 140px;
  background: var(--surface); border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); padding: 14px 16px;
  font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  font-size: 13px; color: var(--text-primary); line-height: 1.75;
  resize: vertical; outline: none;
  transition: border-color 0.15s;
}
.memo-textarea:focus { border-color: var(--memo-color, #9c9a90); }
.memo-textarea::placeholder { color: var(--text-tertiary); }
.memo-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 8px;
}
.memo-hint { font-size: 11px; color: var(--text-tertiary); }
.memo-btn {
  font-size: 12px; font-weight: 600;
  background: var(--surface); color: var(--text-secondary);
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  padding: 6px 16px; cursor: pointer;
  font-family: inherit; transition: background 0.15s, color 0.15s;
}
.memo-btn:hover { background: #f0eeea; color: var(--text-primary); }

/* Sidebar memo dot */
.memo-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--dot-color, #ccc);
  flex-shrink: 0; margin-top: 5px;
}

/* ── Sidebar Footer ── */
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  margin-top: 16px;
}
.sidebar-footer-label {
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-tertiary); font-weight: 700; margin-bottom: 8px;
}
.memo-io-btns { display: flex; gap: 6px; margin-bottom: 8px; }
.memo-io-btn {
  flex: 1; font-size: 11px; font-weight: 600;
  padding: 7px 0; border-radius: var(--radius-sm);
  border: 1px solid var(--border-strong);
  cursor: pointer; font-family: inherit;
  text-align: center; transition: background 0.15s, color 0.15s;
}
.memo-io-btn.export { background: var(--surface); color: var(--text-secondary); }
.memo-io-btn.export:hover { background: #f0eeea; color: var(--text-primary); }
.memo-io-btn.import { background: var(--bg); color: var(--text-tertiary); }
.memo-io-btn.import:hover { background: #edecea; color: var(--text-secondary); }

/* GitHub Sync */
.gh-sync-btn {
  width: 100%; font-size: 11px; font-weight: 600;
  padding: 8px 0; border-radius: var(--radius-sm);
  border: 1px solid #B5D4F4; background: #E6F1FB; color: #185FA5;
  cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background 0.15s;
}
.gh-sync-btn:hover { background: #cce3f7; }
.gh-sync-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.gh-token-row {
  display: flex; gap: 6px; margin-bottom: 6px;
}
.gh-token-input {
  flex: 1; font-size: 11px; padding: 6px 10px;
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  font-family: inherit; outline: none; color: var(--text-primary);
  background: var(--surface);
}
.gh-token-input:focus { border-color: #378ADD; }
.gh-token-save {
  font-size: 11px; font-weight: 600; padding: 6px 10px;
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text-secondary);
  cursor: pointer; font-family: inherit; white-space: nowrap;
}
.gh-token-save:hover { background: #f0eeea; }
.gh-status {
  font-size: 10px; color: var(--text-tertiary);
  margin-top: 6px; line-height: 1.6; min-height: 14px;
}
.gh-status.ok { color: #0F6E56; }
.gh-status.err { color: #D85A30; }

/* Scrollbar */
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
</style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner">
    <span class="nav-brand">HR Study</span>
    <div class="nav-links">
      <a href="index.html" class="nav-link">핵심 이론 10선</a>
      <a href="leadership.html" class="nav-link">리더십 유형</a>
      <a href="topics.html" class="nav-link active">주제 후보</a>
    </div>
  </div>
</nav>

<div class="page-wrapper">
  <aside class="sidebar">
    <div class="sidebar-header">학위논문 주제 후보 6선</div>
    <div id="topic-nav"></div>
    <div class="sidebar-footer">
      <div class="sidebar-footer-label">GitHub 메모 동기화</div>
      <div class="gh-token-row">
        <input type="password" class="gh-token-input" id="gh-token-input"
               placeholder="GitHub PAT 입력" autocomplete="off">
        <button class="gh-token-save" onclick="saveToken()">저장</button>
      </div>
      <button class="gh-sync-btn" onclick="loadFromGitHub()" id="gh-load-btn">
        ⬇ GitHub에서 불러오기
      </button>
      <button class="gh-sync-btn" style="margin-top:6px; background:#E7F5EE; color:#0F6E56; border-color:#9FE1CB;" onclick="saveToGitHub()" id="gh-save-btn">
        ⬆ GitHub에 저장하기
      </button>
      <div class="gh-status" id="gh-status"></div>
    </div>
  </aside>
  <main class="content" id="content">
    <div class="empty-state">
      <div class="empty-state-num">—</div>
      <div class="empty-state-text">좌측에서 주제를 선택하세요</div>
    </div>
  </main>
</div>

<script>
const topics = [
  {
    num: '01',
    title: '디지털 전환에 대한 구성원 저항과 웰빙',
    field: '변화관리 / 조직행동론',
    color: '#D85A30',
    colorLight: '#FAECE7',
    colorBorder: '#F5C4B3',
    colorText: '#993C1D',
    theories: ['자원보존이론 (COR)', '인지적 평가이론'],
    status: '탐색중',
    background: [
      '디지털 전환(Digital Transformation)은 조직의 프로세스, 문화, 비즈니스 모델 전반을 재편하는 경영 의제로 자리 잡았다. McKinsey·WEF 보고서에 따르면 전 세계 기업의 70% 이상이 디지털 전환을 추진 중이나, 성공률은 30% 수준에 불과하다. 실패의 핵심 원인으로 기술 문제보다 구성원의 저항(Employee Resistance)이 반복적으로 지목된다.',
      'Oluwafemi et al.(2024)의 통합적 문헌 리뷰는 구성원 저항을 인지적 저항(위협 평가·불신), 정서적 저항(불안·좌절·분노), 행동적 저항(비협조·지식 은닉·사보타주) 세 가지로 분류하며, 저항의 심리적·사회적 다차원성에 대한 통합적 이해가 부재함을 비판하였다.',
      'Van der Schaft et al.(2024)은 구성원이 디지털 전환을 경험하는 과정이 다층적 의미 형성(Sensemaking) 과정임을 보여주었으며, 자율성·역량·관계성의 세 가지 기본 심리 욕구가 위협받을 때 저항 행동이 촉발됨을 보고하였다.',
      'Frontiers(2025) 연구는 변혁적 리더십과 조직 문화 지원이 디지털 전환에 대한 도전적 평가를 높여 혁신 행동을 유발한다는 점을 밝혀, 동일한 전환 자극이 리더십에 따라 상반된 반응을 유발할 수 있음을 시사한다.'
    ],
    problems: [
      { title: '심리적 매개 기제의 미규명', body: '저항의 존재를 확인한 연구는 다수이나, 저항이 어떤 심리적 경로(예: 심리적 안전감 저하)를 거쳐 직무 웰빙이나 성과에 영향을 미치는지에 대한 매개 기제 검증이 부족하다. 특히 자원보존이론(COR)을 적용하여 저항을 자원 손실 인식으로 해석하는 실증 모형이 드물다.' },

// Render sidebar
function renderNav() {
  const nav = document.getElementById('topic-nav');
  nav.innerHTML = topics.map((t, i) => {
    const hasMemo = !!localStorage.getItem(`hr-memo-${t.num}`);
    return `
    <div class="topic-nav-item" id="nav-${i}"
      style="--active-color: ${t.color}"
      onclick="showTopic(${i})">
      <span class="topic-num">${t.num}</span>
      <div style="flex:1;min-width:0">
        <div class="topic-nav-title">${t.title}</div>
        <div class="topic-nav-field">${t.field}</div>
      </div>
      <span class="memo-dot" id="dot-${i}"
        style="--dot-color:${hasMemo ? t.color : 'transparent'};
               border: 1px solid ${hasMemo ? t.color : 'var(--border-strong)'}">
      </span>
    </div>`;
  }).join('');
}

// ── 페이지 로드 시 memos.json 자동 로드 ──
async function loadMemosFromFile() {
  try {
    const res = await fetch('memos.json');
    if (!res.ok) return;
    const data = await res.json();
    topics.forEach(t => {
      const key = `hr-memo-${t.num}`;
      // localStorage에 내용이 없을 때만 파일에서 불러옴
      if (!localStorage.getItem(key) && data[t.num]) {
        localStorage.setItem(key, data[t.num]);
      }
    });
    // 사이드바 dot 갱신
    document.querySelectorAll('.topic-nav-item').forEach((el, i) => {
      const dot = document.getElementById(`dot-${i}`);
      const hasMemo = !!localStorage.getItem(`hr-memo-${topics[i].num}`);
      if (dot) {
        dot.style.setProperty('--dot-color', hasMemo ? topics[i].color : 'transparent');
        dot.style.border = `1px solid ${hasMemo ? topics[i].color : 'var(--border-strong)'}`;
      }
    });
  } catch (e) {
    // memos.json 없으면 무시
  }
}

// ── GitHub API 설정 ──
const GH_OWNER = 'DanielHan-Code';
const GH_REPO  = 'hrstudy';
const GH_FILE  = 'memos.json';
const GH_API   = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;

function saveToken() {
  const input = document.getElementById('gh-token-input');
  if (!input.value.trim()) return;
  localStorage.setItem('gh-pat', input.value.trim());
  input.value = '';
  setGhStatus('ok', 'PAT 저장됨 ✓');
}

function getToken() {
  return localStorage.getItem('gh-pat') || '';
}

function setGhStatus(type, msg) {
  const el = document.getElementById('gh-status');
  if (!el) return;
  el.textContent = msg;
  el.className = 'gh-status ' + (type || '');
  if (type === 'ok') setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 3000);
}

function setGhBusy(busy) {
  ['gh-load-btn','gh-save-btn'].forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.disabled = busy;
  });
}

// ── GitHub에서 메모 불러오기 ──
async function loadFromGitHub() {
  const token = getToken();
  if (!token) { setGhStatus('err', '먼저 PAT를 입력·저장하세요'); return; }
  setGhBusy(true);
  setGhStatus('', '불러오는 중…');
  try {
    const res = await fetch(GH_API, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github+json' }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const data = JSON.parse(atob(json.content.replace(/\n/g,'')));
    topics.forEach(t => {
      if (data[t.num] !== undefined) localStorage.setItem(`hr-memo-${t.num}`, data[t.num]);
    });
    const activeNav = document.querySelector('.topic-nav-item.active');
    if (activeNav) {
      const idx = [...document.querySelectorAll('.topic-nav-item')].indexOf(activeNav);
      if (idx >= 0) showTopic(idx);
    }
    renderNav();
    setGhStatus('ok', '불러오기 완료 ✓');
  } catch(e) {
    setGhStatus('err', '오류: ' + e.message);
  } finally {
    setGhBusy(false);
  }
}

// ── GitHub에 메모 저장하기 ──
async function saveToGitHub() {
  const token = getToken();
  if (!token) { setGhStatus('err', '먼저 PAT를 입력·저장하세요'); return; }
  setGhBusy(true);
  setGhStatus('', '저장 중…');
  try {
    // 현재 SHA 가져오기
    const getRes = await fetch(GH_API, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github+json' }
    });
    let sha = null;
    if (getRes.ok) {
      const getJson = await getRes.json();
      sha = getJson.sha;
    }
    // 데이터 빌드
    const data = { _exported: new Date().toISOString() };
    topics.forEach(t => { data[t.num] = localStorage.getItem(`hr-memo-${t.num}`) || ''; });
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    // PUT 요청
    const body = { message: 'Update memos via HR Study app', content };
    if (sha) body.sha = sha;
    const putRes = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        Authorization: `token ${token}`,
        Accept: 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if (!putRes.ok) {
      const err = await putRes.json();
      throw new Error(err.message || `HTTP ${putRes.status}`);
    }
    setGhStatus('ok', 'GitHub 저장 완료 ✓');
  } catch(e) {
    setGhStatus('err', '오류: ' + e.message);
  } finally {
    setGhBusy(false);
  }
}

// ── 내보내기: memos.json 다운로드 ──
function exportMemos() {
  const data = { _exported: new Date().toISOString() };
  topics.forEach(t => {
    const memo = localStorage.getItem(`hr-memo-${t.num}`);
    data[t.num] = memo || '';
  });
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'memos.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ── 가져오기: memos.json 업로드 ──
function importMemos(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      topics.forEach(t => {
        if (data[t.num] !== undefined) {
          localStorage.setItem(`hr-memo-${t.num}`, data[t.num]);
        }
      });
      // 현재 열린 주제 갱신
      const activeNav = document.querySelector('.topic-nav-item.active');
      if (activeNav) {
        const idx = [...document.querySelectorAll('.topic-nav-item')].indexOf(activeNav);
        if (idx >= 0) showTopic(idx);
      }
      renderNav();
      alert('메모를 성공적으로 가져왔습니다.');
    } catch (err) {
      alert('올바른 memos.json 파일이 아닙니다.');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function saveMemo(topicNum, idx) {
  const textarea = document.getElementById('memo-textarea');
  if (!textarea) return;
  const value = textarea.value;
  localStorage.setItem(`hr-memo-${topicNum}`, value);

  // Show saved indicator
  const indicator = document.getElementById('memo-saved');
  if (indicator) {
    indicator.classList.add('show');
    setTimeout(() => indicator.classList.remove('show'), 2000);
  }

  // Update sidebar dot
  const dot = document.getElementById(`dot-${idx}`);
  const color = topics[idx].color;
  if (dot) {
    dot.style.setProperty('--dot-color', value ? color : 'transparent');
    dot.style.border = `1px solid ${value ? color : 'var(--border-strong)'}`;
  }
}

// Ctrl+S to save
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    const textarea = document.getElementById('memo-textarea');
    if (textarea) {
      e.preventDefault();
      // Find current topic index from active nav item
      const activeNav = document.querySelector('.topic-nav-item.active');
      if (activeNav) {
        const idx = [...document.querySelectorAll('.topic-nav-item')].indexOf(activeNav);
        if (idx >= 0) saveMemo(topics[idx].num, idx);
      }
    }
  }
});

// PAT 저장 여부 표시
(function() {
  const token = localStorage.getItem('gh-pat');
  const input = document.getElementById('gh-token-input');
  if (token && input) {
    input.placeholder = 'PAT 저장됨 (변경하려면 입력)';
  }
})();

if (getToken()) {
  loadFromGitHub();
} else {
  loadMemosFromFile().then(() => renderNav());
}
</script>
