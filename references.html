<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>참고자료 — HR Study</title>
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.09);
  --border-strong: rgba(0,0,0,0.18);
  --text-primary: #1a1a18;
  --text-secondary: #5c5c56;
  --text-tertiary: #9c9a90;
  --radius: 14px;
  --radius-sm: 8px;
  --nav-h: 52px;
  --accent: #1D9E75;
  --accent-bg: #E1F5EE;
  --accent-border: #9FE1CB;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
}

/* ── Nav ── */
.site-nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border-strong);
  padding: 0 24px; height: var(--nav-h);
}
.nav-inner {
  max-width: 1100px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between; height: 100%;
}
.nav-brand {
  font-family: Georgia, serif; font-size: 15px; font-weight: 600;
  color: var(--text-primary);
}
.nav-links { display: flex; gap: 4px; }
.nav-link {
  font-size: 13px; color: var(--text-secondary); text-decoration: none;
  padding: 6px 14px; border-radius: var(--radius-sm);
  transition: background 0.15s, color 0.15s;
}
.nav-link:hover { background: #f0eeea; color: var(--text-primary); }
.nav-link.active { background: #f0eeea; color: var(--text-primary); font-weight: 600; }

/* ── Page ── */
.page-wrap { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

/* ── Header ── */
.page-header-row {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 16px; flex-wrap: wrap; margin-bottom: 20px;
}
.page-header-row h1 {
  font-family: Georgia, serif;
  font-size: clamp(22px, 3vw, 28px); font-weight: 600; line-height: 1.3; margin-bottom: 5px;
}
.page-header-row p { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }

.search-wrap { position: relative; width: 280px; flex-shrink: 0; }
.search-input {
  width: 100%; font-size: 13px; padding: 9px 14px 9px 36px;
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text-primary);
  font-family: inherit; outline: none; transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-tertiary); pointer-events: none; font-size: 15px;
}

/* ── Filters ── */
.filter-bar {
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  padding: 12px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
}
.filter-label {
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-tertiary); font-weight: 700; margin-right: 2px; white-space: nowrap;
}
.filter-sep { width: 1px; height: 14px; background: var(--border-strong); margin: 0 6px; }
.filter-chip {
  font-size: 12px; padding: 4px 12px; border-radius: 20px;
  border: 1px solid var(--border-strong); background: var(--surface);
  color: var(--text-secondary); cursor: pointer; font-family: inherit;
  transition: all 0.15s; white-space: nowrap;
}
.filter-chip:hover { background: #f0eeea; color: var(--text-primary); }
.filter-chip.active {
  background: var(--accent-bg); color: #0F6E56;
  border-color: var(--accent-border); font-weight: 600;
}

/* ── Toolbar ── */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; gap: 10px; flex-wrap: wrap;
}
.ref-count { font-size: 12px; color: var(--text-tertiary); }
.ref-count strong { color: var(--text-primary); }
.toolbar-right { display: flex; gap: 8px; }

/* ── Buttons ── */
.btn {
  font-size: 12px; font-weight: 600; font-family: inherit;
  padding: 7px 14px; border-radius: var(--radius-sm); cursor: pointer;
  transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px;
  border: 1px solid transparent; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #198a65; }
.btn-secondary { background: var(--surface); color: var(--text-secondary); border-color: var(--border-strong); }
.btn-secondary:hover { background: #f0eeea; color: var(--text-primary); }
.btn-blue { background: #E6F1FB; color: #185FA5; border-color: #B5D4F4; }
.btn-blue:hover { background: #cce3f7; }
.btn-blue:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-danger { background: #FAECE7; color: #993C1D; border-color: #F5C4B3; }
.btn-danger:hover { background: #f5d8d0; }
.btn-sm { padding: 4px 10px; font-size: 11px; }

/* ── GitHub Panel ── */
.gh-panel {
  background: var(--surface); border: 1px solid var(--border-strong);
  border-radius: var(--radius); padding: 16px 20px; margin-bottom: 18px; display: none;
}
.gh-panel.open { display: block; }
.gh-panel-title {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-tertiary); font-weight: 700; margin-bottom: 12px;
}
.gh-token-row { display: flex; gap: 6px; margin-bottom: 10px; }
.gh-token-input {
  flex: 1; font-size: 12px; padding: 7px 10px;
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  font-family: inherit; outline: none; color: var(--text-primary); background: var(--bg);
}
.gh-token-input:focus { border-color: #378ADD; }
.gh-actions { display: flex; gap: 8px; }
.gh-status { font-size: 11px; color: var(--text-tertiary); margin-top: 8px; }
.gh-status.ok  { color: #0F6E56; }
.gh-status.err { color: #D85A30; }

/* ── Cards Grid ── */
.cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
@media (max-width: 700px) { .cards-grid { grid-template-columns: 1fr; } }

/* ── Reference Card ── */
.ref-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px;
  display: flex; flex-direction: column; gap: 10px;
  transition: box-shadow 0.2s, border-color 0.2s;
}
.ref-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.07); border-color: var(--border-strong); }

.card-top {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
}
.card-meta-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.year-num {
  font-size: 12px; font-weight: 700; font-family: Georgia, serif; color: var(--text-tertiary);
}
.type-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
  padding: 2px 8px; border-radius: 20px; border: 1px solid transparent;
}
.type-논문   { background: #E6F1FB; color: #185FA5; border-color: #B5D4F4; }
.type-보고서 { background: #EEEDFE; color: #534AB7; border-color: #CECBF6; }
.type-통계   { background: #FAEEDA; color: #854F0B; border-color: #FAC775; }
.type-척도   { background: #E1F5EE; color: #0F6E56; border-color: #9FE1CB; }
.type-기타   { background: #f0eeea; color: var(--text-secondary); border-color: var(--border-strong); }

.card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
.ref-card:hover .card-actions { opacity: 1; }

.card-title { font-size: 14px; font-weight: 700; color: var(--text-primary); line-height: 1.4; }
.card-authors { font-size: 12px; color: var(--text-tertiary); margin-top: 1px; }
.card-source  { font-size: 11px; color: var(--text-tertiary); font-style: italic; }

.card-summary {
  font-size: 13px; color: var(--text-secondary); line-height: 1.7;
  padding: 9px 12px; background: var(--bg); border-radius: var(--radius-sm);
}

.card-chips { display: flex; gap: 5px; flex-wrap: wrap; }
.role-chip {
  font-size: 11px; padding: 2px 8px; border-radius: 4px;
  border: 1px solid var(--border-strong); color: var(--text-secondary); background: var(--bg);
}
.role-chip[data-role="DV 근거"]     { border-color: #9FE1CB; color: #0F6E56; background: #E1F5EE; }
.role-chip[data-role="IV 근거"]     { border-color: #B5D4F4; color: #185FA5; background: #E6F1FB; }
.role-chip[data-role="매개변수 근거"]{ border-color: #CECBF6; color: #534AB7; background: #EEEDFE; }
.role-chip[data-role="조절변수 근거"]{ border-color: #FAC775; color: #854F0B; background: #FAEEDA; }
.role-chip[data-role="척도"]        { border-color: #9FE1CB; color: #0F6E56; background: #E1F5EE; }
.role-chip[data-role="이론 근거"]   { border-color: #CECBF6; color: #534AB7; background: #EEEDFE; }
.role-chip[data-role="선행연구"]    { border-color: #F5C4B3; color: #993C1D; background: #FAECE7; }
.role-chip[data-role="직접 참조"]   { border-color: #6EE7B7; color: #065F46; background: #D1FAE5; font-weight: 700; }
.role-chip[data-role="읽음"]        { border-color: #A5B4FC; color: #3730A3; background: #EEF2FF; }
.role-chip[data-role="인용 예정"]   { border-color: #FCD34D; color: #92400E; background: #FEF3C7; }

.theory-tag {
  font-size: 11px; background: #f0eeea; color: var(--text-secondary);
  padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border-strong);
}

.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 8px; border-top: 1px solid var(--border);
}
.ref-link {
  font-size: 12px; color: #185FA5; text-decoration: none;
  display: inline-flex; align-items: center; gap: 4px; font-weight: 600;
}
.ref-link:hover { text-decoration: underline; }

/* ── Memo ── */
.memo-toggle {
  font-size: 11px; color: var(--text-tertiary); cursor: pointer;
  background: none; border: none; font-family: inherit; padding: 0;
  display: inline-flex; align-items: center; gap: 4px; transition: color 0.15s;
}
.memo-toggle:hover { color: var(--text-secondary); }
.memo-toggle.has-memo { color: var(--accent); }

.memo-area { display: none; }
.memo-area.open { display: flex; flex-direction: column; gap: 6px; }
.memo-textarea {
  width: 100%; min-height: 70px; background: var(--bg);
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  padding: 9px 12px; font-family: inherit; font-size: 12px;
  color: var(--text-primary); line-height: 1.7; resize: vertical; outline: none;
  transition: border-color 0.15s;
}
.memo-textarea:focus { border-color: var(--accent); }
.memo-footer { display: flex; align-items: center; justify-content: space-between; }
.memo-hint   { font-size: 10px; color: var(--text-tertiary); }
.memo-saved  { font-size: 11px; color: var(--accent); opacity: 0; transition: opacity 0.4s; }
.memo-saved.show { opacity: 1; }

/* ── Empty ── */
.empty-state {
  grid-column: 1/-1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 20px; color: var(--text-tertiary); text-align: center; gap: 10px;
}
.empty-icon { font-size: 36px; opacity: 0.3; }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(20,20,18,0.5); backdrop-filter: blur(3px);
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 26px;
  max-width: 520px; width: 100%; max-height: 88vh; overflow-y: auto;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp {
  from { transform: translateY(12px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
}
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close {
  background: #f0eeea; border: none; border-radius: var(--radius-sm);
  padding: 4px 12px; font-size: 13px; color: var(--text-secondary);
  cursor: pointer; font-family: inherit; transition: background 0.15s;
}
.modal-close:hover { background: #e5e3de; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1/-1; }
.form-label {
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-tertiary); font-weight: 700;
}
.form-input, .form-select, .form-textarea {
  font-size: 13px; padding: 8px 10px;
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text-primary);
  font-family: inherit; outline: none; transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { min-height: 76px; resize: vertical; line-height: 1.6; }
.form-hint { font-size: 11px; color: var(--text-tertiary); }

.checkbox-group { display: flex; gap: 6px; flex-wrap: wrap; }
.chk-chip {
  display: flex; align-items: center; gap: 4px;
  font-size: 12px; padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border-strong); background: var(--surface);
  color: var(--text-secondary); cursor: pointer; user-select: none; transition: all 0.15s;
}
.chk-chip input { display: none; }
.chk-chip.checked { background: var(--accent-bg); color: #0F6E56; border-color: var(--accent-border); font-weight: 600; }

.modal-footer {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 8px; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border);
}

.modal::-webkit-scrollbar { width: 4px; }
.modal::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

/* ── Smart Add ── */
.smart-modal { max-width: 460px; }
.input-tabs {
  display: flex; border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 14px;
}
.input-tab {
  flex: 1; padding: 8px 0; font-size: 12px; font-weight: 600;
  text-align: center; cursor: pointer; background: var(--bg);
  color: var(--text-secondary); border: none; font-family: inherit;
  transition: all 0.15s;
}
.input-tab.active { background: var(--surface); color: var(--text-primary); }
.input-tab + .input-tab { border-left: 1px solid var(--border-strong); }
.input-panel { display: none; }
.input-panel.active { display: block; }
.file-drop {
  border: 2px dashed var(--border-strong); border-radius: var(--radius-sm);
  padding: 28px 20px; text-align: center; cursor: pointer; transition: all 0.15s;
}
.file-drop:hover, .file-drop.drag { border-color: var(--accent); background: var(--accent-bg); }
.file-drop.has-file { border-color: var(--accent); background: var(--accent-bg); }
.file-drop-text { font-size: 13px; color: var(--text-secondary); }
.file-drop-sub  { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
.smart-key-row  { display: flex; gap: 6px; margin-bottom: 14px; }
.smart-key-input {
  flex: 1; font-size: 11px; padding: 7px 10px;
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  font-family: inherit; outline: none; background: var(--bg); color: var(--text-primary);
}
.smart-key-input:focus { border-color: var(--accent); }
.analyzing-state {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; padding: 16px; color: var(--text-tertiary); font-size: 13px;
}
.spinner {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid var(--border-strong); border-top-color: var(--accent);
  animation: spin 0.8s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.analyze-btn { width: 100%; margin-top: 14px; padding: 10px; font-size: 13px; font-weight: 700; }
.smart-error { color: #D85A30; font-size: 12px; margin-bottom: 8px; }

@media (max-width: 560px) {
  .search-wrap { width: 100%; }
  .page-header-row { flex-direction: column; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner">
    <span class="nav-brand">HR Study</span>
    <div class="nav-links">
      <a href="index.html" class="nav-link">핵심 이론 10선</a>
      <a href="leadership.html" class="nav-link">리더십 유형</a>
      <a href="topics.html" class="nav-link">주제 후보</a>
      <a href="references.html" class="nav-link active">참고자료</a>
    </div>
  </div>
</nav>

<div class="page-wrap">

  <!-- Header -->
  <div class="page-header-row">
    <div>
      <h1>참고자료</h1>
      <p>Topic 08 · AI 자동화 저항 기질이 직무 몰입에 미치는 영향</p>
    </div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="searchInput" type="text" placeholder="저자, 제목, 키워드 검색…">
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <span class="filter-label">유형</span>
    <button class="filter-chip active" data-ft="type" data-val="전체">전체</button>
    <button class="filter-chip" data-ft="type" data-val="논문">논문</button>
    <button class="filter-chip" data-ft="type" data-val="통계">통계</button>
    <button class="filter-chip" data-ft="type" data-val="척도">척도</button>
    <button class="filter-chip" data-ft="type" data-val="보고서">보고서</button>
    <div class="filter-sep"></div>
    <span class="filter-label">검토 상태</span>
    <button class="filter-chip active" data-ft="role" data-val="전체">전체</button>
    <button class="filter-chip" data-ft="role" data-val="직접 참조">직접 참조</button>
    <button class="filter-chip" data-ft="role" data-val="읽음">읽음</button>
    <button class="filter-chip" data-ft="role" data-val="인용 예정">인용 예정</button>
  </div>

  <!-- GitHub Sync Panel -->
  <div class="gh-panel" id="ghPanel">
    <div class="gh-panel-title">GitHub 동기화</div>
    <div class="gh-token-row">
      <input class="gh-token-input" id="ghToken" type="password" placeholder="GitHub Personal Access Token (repo 권한)">
      <button class="btn btn-secondary btn-sm" onclick="saveToken()">저장</button>
    </div>
    <div class="gh-actions">
      <button class="btn btn-blue btn-sm" id="btnLoad" onclick="loadFromGitHub()">↓ 불러오기</button>
      <button class="btn btn-blue btn-sm" id="btnSave" onclick="saveToGitHub()">↑ GitHub 저장</button>
    </div>
    <div class="gh-status" id="ghStatus"></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="ref-count" id="refCount"><strong>0</strong>개 자료</span>
    <div class="toolbar-right">
      <button class="btn btn-secondary btn-sm" onclick="toggleGhPanel()">⇄ GitHub 동기화</button>
      <button class="btn btn-secondary btn-sm" onclick="openAddModal()">+ 직접 입력</button>
      <button class="btn btn-primary btn-sm" onclick="openSmartModal()">✦ 스마트 추가</button>
    </div>
  </div>

  <!-- Cards -->
  <div class="cards-grid" id="cardsGrid"></div>

</div>

<!-- Smart Add Modal -->
<div class="modal-overlay" id="smartOverlay">
  <div class="modal smart-modal">
    <div class="modal-header">
      <div class="modal-title">✦ 스마트 추가</div>
      <button class="modal-close" onclick="closeSmartModal()">닫기 ✕</button>
    </div>

    <div style="margin-bottom:4px;"><label class="form-label">비밀번호</label></div>
    <div class="smart-key-row">
      <input class="smart-key-input" id="smartPassword" type="password" placeholder="설정한 비밀번호 입력…"
        onkeydown="if(event.key==='Enter') document.getElementById('analyzeArea').querySelector('button').click()">
    </div>

    <div class="input-tabs">
      <button class="input-tab active" onclick="switchTab('pdf')">PDF 파일</button>
      <button class="input-tab"        onclick="switchTab('url')">URL / DOI</button>
      <button class="input-tab"        onclick="switchTab('text')">텍스트</button>
    </div>

    <div class="input-panel active" id="panel-pdf">
      <div class="file-drop" id="fileDrop" onclick="document.getElementById('fileInput').click()">
        <div class="file-drop-text" id="fileDropText">클릭하거나 PDF를 여기에 드래그하세요</div>
        <div class="file-drop-sub">PDF 파일만 지원</div>
      </div>
      <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="handleFile(this)">
    </div>

    <div class="input-panel" id="panel-url">

<script>
const GH_REPO   = 'DanielHan-Code/hrstudy';
const GH_FILE   = 'references.json';
const GH_BRANCH = 'main';

let refs        = [];
let editingId   = null;
let filterType  = '전체';
let filterRole  = '전체';
let searchQuery = '';
let memoTimers  = {};

// ── Init ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadLocal();
  render();
  // 로컬에 데이터 없으면 공개 저장소에서 자동 로드
  if (refs.length === 0) autoLoadPublic();

  const t = localStorage.getItem('gh_token');
  if (t) document.getElementById('ghToken').value = t;

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase();
    render();
  });

  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const ft  = chip.dataset.ft;
      const val = chip.dataset.val;
      if (ft === 'type') filterType = val;
      if (ft === 'role') filterRole = val;
      document.querySelectorAll(`.filter-chip[data-ft="${ft}"]`).forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      render();
    });
  });

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target.id === 'modalOverlay') closeModal();
  });
  document.getElementById('smartOverlay').addEventListener('click', e => {
    if (e.target.id === 'smartOverlay') closeSmartModal();
  });

  document.querySelectorAll('.chk-chip').forEach(label => {
    label.querySelector('input').addEventListener('change', function() {
      label.classList.toggle('checked', this.checked);
    });
  });
});

// ── Storage ───────────────────────────────────────
function loadLocal() {
  const s = localStorage.getItem('hrstudy_refs');
  if (s) { try { refs = JSON.parse(s).references || []; } catch(e) { refs = []; } }
}
function saveLocal() {
  localStorage.setItem('hrstudy_refs', JSON.stringify({ references: refs }));
}

// ── Render ────────────────────────────────────────
function render() {
  const grid     = document.getElementById('cardsGrid');
  const filtered = getFiltered();
  const total    = filtered.length;

  document.getElementById('refCount').innerHTML =
    `<strong>${total}</strong>개 자료${refs.length !== total ? ` (전체 ${refs.length}개 중)` : ''}`;

  if (total === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📚</div>
      <div style="font-size:14px;">${refs.length === 0
        ? 'GitHub에서 불러오거나 자료를 직접 추가하세요.'
        : '검색/필터 결과가 없습니다.'}</div>
    </div>`;
    return;
  }

  const sorted = [...filtered].sort((a, b) => (b.year || 0) - (a.year || 0));
  grid.innerHTML = sorted.map(r => cardHTML(r)).join('');

  sorted.forEach(r => {
    const ta = document.getElementById(`memo-ta-${r.id}`);
    if (!ta) return;
    ta.addEventListener('input',   () => schedMemo(r.id, ta));
    ta.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); commitMemo(r.id, ta); }
    });
  });
}

const READING_TAGS = ['직접 참조', '읽음', '인용 예정'];

function cardHTML(r) {
  const roles = r.roles || [];
  const readingChips = roles.filter(role => READING_TAGS.includes(role))
    .map(role => `<span class="role-chip" data-role="${esc(role)}">${esc(role)}</span>`).join('');
  const roleChips = roles.filter(role => !READING_TAGS.includes(role))
    .map(role => `<span class="role-chip" data-role="${esc(role)}">${esc(role)}</span>`).join('');
  const theoryTags = (r.theories || []).map(t =>
    `<span class="theory-tag">${esc(t)}</span>`).join('');
  const hasMemo = (r.memo || '').trim().length > 0;
  return `
    <div class="ref-card">
      <div class="card-top">
        <div class="card-meta-badges">
          <span class="year-num">${r.year || '–'}</span>
          <span class="type-badge type-${esc(r.type || '기타')}">${esc(r.type || '기타')}</span>
          ${readingChips}
        </div>
        <div class="card-actions">
          <button class="btn btn-secondary btn-sm" onclick="openEditModal('${r.id}')">편집</button>
          <button class="btn btn-danger btn-sm"    onclick="deleteRef('${r.id}')">삭제</button>
        </div>
      </div>
      <div>
        <div class="card-title">${esc(r.title || '제목 없음')}</div>
        <div class="card-authors">${esc(r.authors || '')}</div>
        ${r.source ? `<div class="card-source">${esc(r.source)}</div>` : ''}
      </div>
      ${r.summary ? `<div class="card-summary">${esc(r.summary)}</div>` : ''}
      <div class="card-chips">
        ${roleChips}${theoryTags}
      </div>
      <div class="card-footer">
        ${r.url
          ? `<a class="ref-link" href="${r.url}" target="_blank" rel="noopener noreferrer">원문 링크 ↗</a>`
          : `<span></span>`}
        <button class="memo-toggle ${hasMemo ? 'has-memo' : ''}"
          id="memo-btn-${r.id}" onclick="toggleMemo('${r.id}')">
          ${hasMemo ? '📝 메모 있음' : '메모 추가'}
        </button>
      </div>
      <div class="memo-area ${hasMemo ? 'open' : ''}" id="memo-area-${r.id}">
        <textarea class="memo-textarea" id="memo-ta-${r.id}"
          placeholder="이 자료에 대한 메모… (Ctrl+S 저장)">${esc(r.memo || '')}</textarea>
        <div class="memo-footer">
          <span class="memo-hint">Ctrl+S 저장</span>
          <span class="memo-saved" id="memo-saved-${r.id}">저장됨 ✓</span>
        </div>
      </div>
    </div>`;
}

function getFiltered() {
  return refs.filter(r => {
    if (filterType !== '전체' && r.type !== filterType) return false;
    if (filterRole !== '전체' && !(r.roles || []).includes(filterRole)) return false;
    if (searchQuery) {
      const hay = [r.title, r.authors, r.source, r.summary, ...(r.tags||[]), ...(r.theories||[])].join(' ').toLowerCase();
      if (!hay.includes(searchQuery)) return false;
    }
    return true;
  });
}

// ── Memo ──────────────────────────────────────────
function toggleMemo(id) {
  document.getElementById(`memo-area-${id}`).classList.toggle('open');
}
function schedMemo(id, ta) {
  clearTimeout(memoTimers[id]);
  memoTimers[id] = setTimeout(() => commitMemo(id, ta), 1200);
}
function commitMemo(id, ta) {
  const r = refs.find(x => x.id === id);
  if (!r) return;
  r.memo = ta.value;
  saveLocal();
  if (getToken()) saveToGitHub();
  const btn = document.getElementById(`memo-btn-${id}`);
  if (btn) { const has = r.memo.trim().length > 0; btn.textContent = has ? '📝 메모 있음' : '메모 추가'; btn.classList.toggle('has-memo', has); }
  const ind = document.getElementById(`memo-saved-${id}`);
  if (ind) { ind.classList.add('show'); setTimeout(() => ind.classList.remove('show'), 1800); }
}

// ── CRUD ──────────────────────────────────────────
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '자료 추가';
  clearForm();
  document.getElementById('modalOverlay').classList.add('open');
}
function openEditModal(id) {
  const r = refs.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '자료 편집';
  fillForm(r);
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}
function clearForm() {
  ['fAuthors','fYear','fTitle','fSource','fUrl','fTheories','fSummary'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fType').value = '논문';
  document.querySelectorAll('#rolesGroup .chk-chip').forEach(l => { l.querySelector('input').checked = false; l.classList.remove('checked'); });
}
function fillForm(r) {
  document.getElementById('fAuthors').value  = r.authors  || '';
  document.getElementById('fYear').value     = r.year     || '';
  document.getElementById('fTitle').value    = r.title    || '';
  document.getElementById('fSource').value   = r.source   || '';
  document.getElementById('fType').value     = r.type     || '논문';
  document.getElementById('fUrl').value      = r.url      || '';
  document.getElementById('fTheories').value = (r.theories||[]).join(', ');
  document.getElementById('fSummary').value  = r.summary  || '';
  document.querySelectorAll('#rolesGroup .chk-chip').forEach(l => {
    const inp = l.querySelector('input');
    const chk = (r.roles||[]).includes(inp.value);
    inp.checked = chk; l.classList.toggle('checked', chk);
  });
}
function getFormData() {
  const roles = [];
  document.querySelectorAll('#rolesGroup .chk-chip input:checked').forEach(i => roles.push(i.value));
  return {
    authors:  document.getElementById('fAuthors').value.trim(),
    year:     parseInt(document.getElementById('fYear').value) || null,
    title:    document.getElementById('fTitle').value.trim(),
    source:   document.getElementById('fSource').value.trim(),
    type:     document.getElementById('fType').value,
    url:      document.getElementById('fUrl').value.trim(),
    theories: document.getElementById('fTheories').value.split(',').map(s=>s.trim()).filter(Boolean),
    summary:  document.getElementById('fSummary').value.trim(),
    roles, tags: [], memo: ''
  };
}
function saveRef() {
  const data = getFormData();
  if (!data.title) { alert('제목을 입력해주세요.'); return; }
  if (editingId) {
    const idx = refs.findIndex(r => r.id === editingId);
    if (idx !== -1) { data.id = editingId; data.memo = refs[idx].memo || ''; refs[idx] = data; }
  } else {
    data.id = 'ref_' + Date.now(); refs.push(data);
  }
  saveLocal(); closeModal(); render();
  if (getToken()) saveToGitHub();
}
function deleteRef(id) {
  if (!confirm('이 자료를 삭제하시겠습니까?')) return;
  refs = refs.filter(r => r.id !== id);
  saveLocal(); render();
  if (getToken()) saveToGitHub();
}

// ── GitHub ────────────────────────────────────────
function toggleGhPanel() { document.getElementById('ghPanel').classList.toggle('open'); }
function saveToken() {
  const t = document.getElementById('ghToken').value.trim();
  if (t) localStorage.setItem('gh_token', t);
  setStatus('토큰 저장 완료', 'ok');
}
function setStatus(msg, cls='') {
  const el = document.getElementById('ghStatus');
  el.textContent = msg; el.className = 'gh-status' + (cls ? ' ' + cls : '');
}
function getToken() { return localStorage.getItem('gh_token') || document.getElementById('ghToken').value.trim(); }

async function loadFromGitHub() {
  const token = getToken();
  if (!token) { setStatus('토큰을 먼저 입력해주세요.', 'err'); return; }
  const btn = document.getElementById('btnLoad');
  btn.disabled = true; setStatus('불러오는 중…');
  try {
    const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}`, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json    = await res.json();
    const content = JSON.parse(atob(json.content.replace(/\n/g, '')));
    refs = content.references || [];
    saveLocal(); render();
    setStatus(`불러오기 완료 — ${refs.length}개 자료`, 'ok');
  } catch(e) { setStatus('불러오기 실패: ' + e.message, 'err'); }
  finally    { btn.disabled = false; }
}

async function saveToGitHub() {
  const token = getToken();
  if (!token) { setStatus('토큰을 먼저 입력해주세요.', 'err'); return; }
  const btn = document.getElementById('btnSave');
  btn.disabled = true; setStatus('저장 중…');
  try {
    const getRes = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}`, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    let sha = null;
    if (getRes.ok) { const j = await getRes.json(); sha = j.sha; }

    const content = btoa(unescape(encodeURIComponent(JSON.stringify({ references: refs }, null, 2))));
    const body = { message: `Update references.json (${refs.length}개 자료)`, content, branch: GH_BRANCH };
    if (sha) body.sha = sha;

    const putRes = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!putRes.ok) { const e = await putRes.json(); throw new Error(e.message || `HTTP ${putRes.status}`); }
    setStatus(`GitHub 저장 완료 — ${refs.length}개 자료`, 'ok');
  } catch(e) { setStatus('저장 실패: ' + e.message, 'err'); }
  finally    { btn.disabled = false; }
}

// ── Crypto ────────────────────────────────────────
// 암호화된 API 키 (비밀번호로 복호화)
const ENCRYPTED_API_KEY = 'd8p/pW84PdKVp9vYKcLAdnQ2S/wDv7JfIcgmn3Y0j6ryEuvErIjeOIwWgZnGgCtiorJMFlUwYqPGDFiUI6HBRKCYsdwsrNkYqbvtCX+bAZvDxiImjzxpxT9Ot32JCuQ1QSOxhiLUhLMY/UxHQiCq1vbHYIIi+EdYfyCXRbFofN7MQZrqE6F2L7yvEAMeWBT5aG0S70UeZx8=';

async function _deriveKey(password, salt) {
  const km = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    km, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
  );
}

// 브라우저 콘솔에서 호출해 암호화된 키 생성: generateEncryptedKey('sk-ant-...', '비밀번호')
async function generateEncryptedKey(apiKey, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await _deriveKey(password, salt);
  const ct   = await crypto.subtle.encrypt(
    { name: 'AES-GCM', iv }, key, new TextEncoder().encode(apiKey)
  );
  const buf = new Uint8Array(16 + 12 + ct.byteLength);
  buf.set(salt, 0); buf.set(iv, 16); buf.set(new Uint8Array(ct), 28);
  const result = btoa(String.fromCharCode(...buf));
  console.log('%c✓ 아래 문자열을 ENCRYPTED_API_KEY에 붙여넣으세요:', 'color:green;font-weight:bold');
  console.log(result);
  return result;
}

async function _decryptApiKey(password) {
  if (!ENCRYPTED_API_KEY) throw new Error('ENCRYPTED_API_KEY가 설정되지 않았습니다.');
  const buf  = Uint8Array.from(atob(ENCRYPTED_API_KEY), c => c.charCodeAt(0));
  const key  = await _deriveKey(password, buf.slice(0, 16));
  const plain = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: buf.slice(16, 28) }, key, buf.slice(28)
  );
  return new TextDecoder().decode(plain);
}

// ── Smart Add ─────────────────────────────────────
let currentTab    = 'pdf';
let pdfBase64     = null;
let _cachedApiKey = null;  // 세션 중 캐시

function openSmartModal() {
  document.getElementById('smartOverlay').classList.add('open');
  document.getElementById('smartPassword').focus();
  // drag & drop
  const drop = document.getElementById('fileDrop');
  drop.addEventListener('dragover',  e => { e.preventDefault(); drop.classList.add('drag'); });
  drop.addEventListener('dragleave', ()  => drop.classList.remove('drag'));
  drop.addEventListener('drop', e => {
    e.preventDefault(); drop.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') {
      document.getElementById('fileInput').files = e.dataTransfer.files;
      handleFile(document.getElementById('fileInput'));
    }
  });
}

function closeSmartModal() {
  document.getElementById('smartOverlay').classList.remove('open');
  pdfBase64 = null;
  document.getElementById('fileDropText').textContent = '클릭하거나 PDF를 여기에 드래그하세요';
  document.getElementById('fileDrop').classList.remove('has-file');
  document.getElementById('smartPassword').value = '';
  resetAnalyzeBtn();
}

function resetAnalyzeBtn() {
  document.getElementById('analyzeArea').innerHTML =
    '<button class="btn btn-primary analyze-btn" onclick="analyze()">분석하기</button>';
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.input-tab').forEach((t, i) => {
    t.classList.toggle('active', ['pdf','url','text'][i] === tab);
  });
  document.querySelectorAll('.input-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
}

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    pdfBase64 = e.target.result.split(',')[1];
    document.getElementById('fileDropText').textContent = `✓ ${file.name}`;
    document.getElementById('fileDrop').classList.add('has-file');
  };
  reader.readAsDataURL(file);
}

async function analyze() {
  document.getElementById('analyzeArea').innerHTML =
    '<div class="analyzing-state"><div class="spinner"></div>분석 중…</div>';

  let apiKey = _cachedApiKey;
  if (!apiKey) {
    const pw = document.getElementById('smartPassword').value.trim();
    if (!pw) { resetAnalyzeBtn(); alert('비밀번호를 입력해주세요.'); return; }
    try {
      apiKey = await _decryptApiKey(pw);
      _cachedApiKey = apiKey;
    } catch(e) {
      resetAnalyzeBtn();
      alert('비밀번호가 올바르지 않습니다.');
      return;
    }
  }

  const PROMPT = `다음 자료에서 서지 정보를 추출해서 아래 JSON 형식으로만 응답하세요. JSON 외 다른 텍스트는 절대 출력하지 마세요.

{
  "authors": "저자명 (Last, F. M. 형식)",
  "year": 2024,
  "title": "제목",
  "source": "학술지명, 권(호), 페이지",
  "type": "논문",
  "theories": ["이론 약어 배열, 예: COR, JD-R, SDT, TAM, RTC, JCT, SET"],
  "summary": "핵심 내용 2~3문장 한국어 요약",
  "roles": ["이론 근거 / 선행연구 / IV 근거 / 매개변수 근거 / 조절변수 근거 / DV 근거 / 척도 / 데이터 중 해당하는 것"],
  "url": "DOI 또는 URL"
}

type은 반드시 논문/보고서/통계/척도/기타 중 하나.`;

  let content = [];
  if (currentTab === 'pdf') {
    if (!pdfBase64) { resetAnalyzeBtn(); alert('PDF 파일을 선택해주세요.'); return; }
    content = [
      { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: pdfBase64 } },
      { type: 'text', text: PROMPT }
    ];
  } else if (currentTab === 'url') {
    const url = document.getElementById('smartUrl').value.trim();
    if (!url) { resetAnalyzeBtn(); alert('URL을 입력해주세요.'); return; }
    content = [{ type: 'text', text: `다음 URL/DOI의 논문 정보를 채워주세요: ${url}\n\n${PROMPT}` }];
  } else {
    const text = document.getElementById('smartText').value.trim();
    if (!text) { resetAnalyzeBtn(); alert('텍스트를 입력해주세요.'); return; }
    content = [{ type: 'text', text: `${text}\n\n${PROMPT}` }];
  }

  try {
    const reqHeaders = {
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'content-type': 'application/json',
    };
    if (currentTab === 'pdf') reqHeaders['anthropic-beta'] = 'pdfs-2024-09-25';

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: reqHeaders,
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        messages: [{ role: 'user', content }]
      })
    });

    if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
    const data    = await res.json();
    const raw     = data.content[0].text.trim();
    const jsonStr = raw.match(/\{[\s\S]*\}/)?.[0];
    if (!jsonStr) throw new Error('응답에서 JSON을 찾을 수 없습니다.');
    const ex = JSON.parse(jsonStr);

    closeSmartModal();
    clearForm();
    if (ex.authors)   document.getElementById('fAuthors').value   = ex.authors;
    if (ex.year)      document.getElementById('fYear').value      = ex.year;
    if (ex.title)     document.getElementById('fTitle').value     = ex.title;
    if (ex.source)    document.getElementById('fSource').value    = ex.source;
    if (ex.type)      document.getElementById('fType').value      = ex.type;
    if (ex.url)       document.getElementById('fUrl').value       = ex.url;
    if (ex.theories)  document.getElementById('fTheories').value  = ex.theories.join(', ');
    if (ex.summary)   document.getElementById('fSummary').value   = ex.summary;
    if (ex.roles) {
      document.querySelectorAll('#rolesGroup .chk-chip').forEach(label => {
        const inp = label.querySelector('input');
        const chk = ex.roles.includes(inp.value);
        inp.checked = chk; label.classList.toggle('checked', chk);
      });
    }
    editingId = null;
    document.getElementById('modalTitle').textContent = '자료 추가 — 자동 추출 결과 확인';
    document.getElementById('modalOverlay').classList.add('open');

  } catch(e) {
    console.error('[SmartAdd] error:', e);
    // 인증 오류일 때만 캐시 초기화 (네트워크 오류 시 재입력 불필요)
    if (e.message && (e.message.includes('401') || e.message.includes('authentication') || e.message.includes('비밀번호'))) {
      _cachedApiKey = null;
    }
    const isNetwork = e instanceof TypeError && e.message === 'Failed to fetch';
    const hint = isNetwork
      ? '<br><small>CORS 또는 네트워크 오류입니다. 브라우저 콘솔(F12)에서 자세한 내용을 확인해 주세요.</small>'
      : '';
    document.getElementById('analyzeArea').innerHTML =
      `<div class="smart-error">오류: ${e.message}${hint}</div>
       <button class="btn btn-primary analyze-btn" onclick="analyze()">다시 시도</button>`;
  }
}

// ── Auto Load (public repo, no token needed) ──────
async function autoLoadPublic() {
  try {
    const res = await fetch(
      `https://raw.githubusercontent.com/${GH_REPO}/${GH_BRANCH}/${GH_FILE}?t=${Date.now()}`
    );
    if (!res.ok) return;
    const json = await res.json();
    refs = json.references || [];
    saveLocal();
    render();
  } catch(e) { /* 조용히 실패 */ }
}

// ── Util ──────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
